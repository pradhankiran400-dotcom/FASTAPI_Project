<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}FastAPI Blog - {{ title }}{% else %}FastAPI Blog{% endif %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css?v=1.0.1">
    <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>
    <nav class="navbar">
        <a class="nav-brand" href="/">The Blog</a>
        <div class="nav-links" style="display: flex; align-items: center;">
            <a href="/">Home</a>
            <a href="/docs" target="_blank">API</a>
            <button id="themeToggle" class="btn btn-ghost" type="button" style="padding: 0.3rem 0.6rem; margin-left: 0.5rem; font-size: 1.1rem; display: flex; align-items: center;" title="Toggle Dark Theme">🌓</button>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock content %}
    </main>
    <footer class="footer">
        <p>© {{ now.year if now else "2026" }} The Blog Built with FastAPI</p>
    </footer>
    <script src="/static/js/app.js"></script>
</body>
</html>
